services:
  - type: web
    name: aegisshield-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: aegisshield-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: aegisshield-db
    databaseName: aegisshield
    plan: free
