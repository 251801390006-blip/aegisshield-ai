{% extends "base.html" %}
{% block title %}429 – Too Many Requests{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center text-center p-4">
  <div>
    <div style="font-size:5rem;font-weight:900;color:var(--warning);font-family:var(--font-mono);">429</div>
    <h1 style="font-size:1.5rem;font-weight:700;margin:1rem 0 0.5rem;">Too Many Requests</h1>
    <p style="color:var(--text-muted);margin-bottom:2rem;">You've exceeded the rate limit. Please wait a moment before trying again.</p>
    <a href="javascript:history.back()" class="btn-neon">Go Back</a>
  </div>
</div>
{% endblock %}
