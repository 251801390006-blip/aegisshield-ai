{% extends "base.html" %}
{% block title %}404 – Page Not Found{% endblock %}
{% block body %}
<div class="min-vh-100 d-flex align-items-center justify-content-center text-center p-4">
  <div>
    <div style="font-size:6rem;margin-bottom:1rem;filter:drop-shadow(0 0 30px rgba(0,212,255,0.3));">🛡</div>
    <div style="font-size:5rem;font-weight:900;color:var(--neon-blue);font-family:var(--font-mono);line-height:1;">404</div>
    <h1 style="font-size:1.5rem;font-weight:700;margin:1rem 0 0.5rem;">Page Not Found</h1>
    <p style="color:var(--text-muted);max-width:400px;margin:0 auto 2rem;">The page you are looking for does not exist or has been moved.</p>
    <a href="{{ url_for('main.landing') }}" class="btn-neon" style="display:inline-block;padding:0.75rem 2rem;">
      <i class="bi bi-house me-1"></i>Back to Home
    </a>
  </div>
</div>
{% endblock %}
