<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cyber Squad AI – Advanced AI-Powered Cyber Crime Detection Platform. Detect spam, phishing, malware, and analyze password strength.">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta name="keywords" content="cybersecurity, AI, spam detection, phishing, malware, password analyzer">
  <meta name="author" content="Cyber Squad AI">
  <meta property="og:title" content="{% block og_title %}Cyber Squad AI{% endblock %}">
  <meta property="og:description" content="AI-Powered Cyber Crime Detection Platform">
  <meta property="og:type" content="website">
  <title>{% block title %}Cyber Squad AI{% endblock %} – Cyber Crime Detection</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Cyber Squad CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}?v=1.0.9">

  {% block extra_css %}{% endblock %}

  <style>
    /* Inline critical – flash messages */
    .flash-messages { position: fixed; top: 5rem; right: 1.5rem; z-index: 9999; width: 360px; }
  </style>
</head>
<body class="gradient-bg">

<!-- Flash Messages -->
<div class="flash-messages" id="flashMessages">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="toast-cybersquad {{ 'danger' if category == 'error' else category }} mb-2 fade-in" id="flash-{{ loop.index }}">
        <i class="bi bi-{{ 'check-circle' if category == 'success' else 'exclamation-triangle' if category in ('danger','error') else 'info-circle' }}"></i>
        <span>{{ message }}</span>
        <button class="btn p-0 ms-auto" style="color:var(--text-muted)" onclick="this.parentElement.remove()">
          <i class="bi bi-x"></i>
        </button>
      </div>
    {% endfor %}
  {% endwith %}
</div>

{% block body %}{% endblock %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<!-- Cyber Squad Main JS -->
<script src="{{ url_for('static', filename='js/main.js') }}?v=1.0.9"></script>

{% block extra_js %}{% endblock %}

<script>
  // Auto-dismiss flash messages
  setTimeout(() => {
    document.querySelectorAll('.toast-cybersquad').forEach(el => {
      el.style.opacity = '0';
      el.style.transition = 'opacity 0.5s';
      setTimeout(() => el.remove(), 500);
    });
  }, 5000);
</script>
</body>
</html>
